# ===== LOCAL DEVELOPMENT PROFILE =====
# Safe defaults so developers can run the app with zero environment setup.

# Database - local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/Bridge_PlacementSystem
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - fixed dev-only secret (32+ chars, NEVER use in production)
bridge.app.jwtSecret=local-dev-bridge-secret-key-minimum-32-chars-long!!

# Mail - disabled for local dev (OTP will print to console instead)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

