# Server Configuration
server.port=${PORT:9092}
server.servlet.context-path=/api

# Default profile = local development (override with SPRING_PROFILES_ACTIVE=prod on cloud)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA Configuration (shared)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Multipart File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Expiration (shared)
bridge.app.jwtExpirationMs=86400000

# CORS Configuration
bridge.app.frontendUrl=${FRONTEND_URL:http://localhost:5173}
